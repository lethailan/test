<body class="intro-body">

    <div class="intro-container">
        <div class="intro-content">
            <h1 class="f-title">Đóng góp ý kiến cho thư viện của nhà trường</h1>
            
            <div class="form-container">
                <form action="GopY2.html">
                    <h2 class="f-section">1. Thông tin về người góp ý</h2>
                    <div class="form-group f-text">
                        <label for="txtTen">Họ và tên:</label>
                        <input type="text" id="txtTen" name="txtTen">
                    </div>
                    <div class="form-group f-text">
                        <label for="txtEmail">Địa chỉ email:</label>
                        <input type="text" id="txtEmail" name="txtEmail">
                    </div>

                    <h2 class="f-section">2. Thể loại cần bổ sung thêm sách</h2>
                    <div class="checkbox-group f-text">
                        <label class="checkbox-item">
                            <input type="checkbox" name="chkTruyenNgan"> Truyện ngắn
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="chkKiNang"> Kĩ năng sống
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="chkCNTT"> Công nghệ thông tin
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="chkTruyenTranh"> Truyện tranh
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="chkLichSu"> Lịch sử
                        </label>
                    </div>

                    <h2 class="f-section">3. Đóng góp ý kiến</h2>
                    <div class="form-group f-text">
                        <label for="txtComment">Ý kiến đóng góp:</label>
                        <textarea id="txtComment" name="txtComment" rows="6"></textarea>
                    </div>

                    <div class="form-group">
                        <input type="submit" name="cmd" value="Góp ý" class="btn-submit">
                    </div>

                </form>
            </div>
        </div>
    </div>
