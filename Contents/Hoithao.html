<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tham gia Hội thao</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body class="intro-body">
    <div class="intro-container">
        <div class="intro-content">
            <h1 class="f-title">ĐĂNG KÝ HỘI THAO</h1>
            <div class="form-container">
                <form action="Hoithao2.html">
                    
                    <h2 class="f-section">1. Thông tin về người đăng ký</h2>
                    <div class="form-group f-text">
                        <label for="txtTen">Họ và tên:</label>
                        <input type="text" id="txtTen" name="txtTen">
                    </div>
                    <div class="form-group f-text">
                        <label for="txtEmail">Địa chỉ email:</label>
                        <input type="email" id="txtEmail" name="txtEmail">
                    </div>
                    <h2 class="f-section">2. Thông tin lớp học</h2>
                    <div class="form-group f-text">
                        <p>Học sinh lớp:</p>
                        <label class="radio-item">
                            <input type="radio" name="optLop" value="10"> Lớp 10
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="optLop" value="11"> Lớp 11
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="optLop" value="12"> Lớp 12
                        </label>
                    </div>
                    <h2 class="f-section">3. Nội dung đăng ký thi đấu</h2>
                    <div class="checkbox-group f-text">
                        <label class="checkbox-item">
                            <input type="checkbox" name="chkBongBan"> Bóng bàn
                        </label><br>
                        <label class="checkbox-item">
                            <input type="checkbox" name="chkCauLong"> Cầu lông
                        </label><br>
                        <label class="checkbox-item">
                            <input type="checkbox" name="chkCoVua"> Cờ vua
                        </label>
                    </div>

                    <div class="form-group" style="margin-top: 20px;">
                        <input type="submit" name="cmd" value="Đăng ký" class="btn-submit">
                        <input type="reset" name="cmd" value="Hủy bỏ" class="btn-submit" style="background-color: #ccc; color: #333;">
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
